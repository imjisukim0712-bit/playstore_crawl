name: Play Store Daily Scrape

on:
  schedule:
    - cron: '0 0,6,18 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ./server
      - run: node index.js --ci
        working-directory: ./server
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/output/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto scrape JSON $(date '+%Y-%m-%d %H:%M')"
          git push

  scrape-games-excel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ./server
      - run: node index.js --ci-games-excel
        working-directory: ./server
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/output/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto scrape games Excel $(date '+%Y-%m-%d %H:%M')"
          git push
